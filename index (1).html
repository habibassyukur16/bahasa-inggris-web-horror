<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PRISONER WHO NEVER LEFT</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Spectral&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'Spectral', serif;
    text-align: center;
}

.logo-img {
    width: 120px;
    border-radius: 50%;
    margin-top: 40px;
}

h1 {
    font-family: 'Creepster';
    color: #8b0000;
}

.story {
    max-width: 700px;
    margin: 40px auto;
    text-align: justify;
    line-height: 1.8;
}
</style>
</head>

<body>

<img src="logo.jpg" class="logo-img">

<h1>THE PRISONER WHO NEVER LEFT</h1>

<audio id="music" autoplay loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="story">
<p>The old house stood at the edge of the town...</p>
<p>Strange things began to happen every night...</p>
<p>"I have a new friend..."</p>
<p>The prisoner was gone. But never free.</p>
</div>

<script>
document.addEventListener("click", () => {
    document.getElementById("music").play();
});
</script>

</body>
</html>
