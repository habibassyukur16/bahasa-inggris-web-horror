<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PRISONER WHO NEVER LEFT - Web Novel Horor</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Spectral:wght@300;400;600&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'Spectral', serif;

}
.logo-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
}
</style>
</head>

<body>

<audio id="bg-music" loop autoplay muted>

</audio>

<script>

    music.muted = false;
